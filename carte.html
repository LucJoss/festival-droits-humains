<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte des villes — Au Cinéma Pour les Droits Humains</title>
  <meta name="description" content="Trouvez les diffusions du festival dans votre ville — carte interactive des 20 villes partenaires dans le sud de la France.">
  <link rel="icon" href="faviconV2.png" type="image/png">
  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="Carte des villes — Au Cinéma Pour les Droits Humains 2027">
  <meta property="og:description" content="20 villes partenaires dans le sud de la France. Retrouvez le festival près de chez vous.">
  <meta property="og:image"       content="https://lucjoss.github.io/festival-droits-humains/og-cover.png">
  <meta property="og:url"         content="https://lucjoss.github.io/festival-droits-humains/carte.html">
  <meta property="og:locale"      content="fr_FR">
  <meta name="twitter:card"       content="summary_large_image">
  <link rel="stylesheet" href="css/style.css">
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    /* Carte plein écran sous la nav */
    body { overflow: hidden; }
    @media (max-width: 768px) { body { overflow: auto; } }
  </style>
</head>
<body>

  <!-- ── NAVIGATION ─────────────────────────────────────── -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <img src="faviconV2.png" alt="Amnesty International" class="nav-logo-img">
      <div class="nav-logo-text">Au Cinéma <span>Pour les Droits Humains</span></div>
    </a>
    <div class="nav-links">
      <a href="index.html"     class="nav-link">Accueil</a>
      <a href="films.html"     class="nav-link">Films</a>
      <a href="programme.html" class="nav-link">Programme</a>
      <a href="carte.html"     class="nav-link">Carte</a>
    </div>
    <button class="nav-burger" aria-label="Menu"><span></span><span></span><span></span></button>
  </nav>
  <div class="nav-mobile">
    <a href="index.html"     class="nav-link">Accueil</a>
    <a href="films.html"     class="nav-link">Films</a>
    <a href="programme.html" class="nav-link">Programme</a>
    <a href="carte.html"     class="nav-link">Carte</a>
  </div>

  <!-- ── HUD ────────────────────────────────────────────── -->
  <div class="map-hud">
    <div class="hud-stat">
      <span class="hud-stat-num">50</span>
      <span class="hud-stat-label">Films</span>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-stat">
      <span class="hud-stat-num">20</span>
      <span class="hud-stat-label">Villes</span>
    </div>
    <div class="hud-divider"></div>
    <div class="hud-stat">
      <span class="hud-stat-num" id="hud-screenings">—</span>
      <span class="hud-stat-label">Séances</span>
    </div>
    <div class="hud-scan-indicator">
      <div class="hud-dot"></div>
      <span>Festival · Mars 2027</span>
    </div>
  </div>

  <!-- ── MAP WRAPPER ─────────────────────────────────────── -->
  <div class="map-wrapper">

    <!-- Sidebar gauche -->
    <aside class="map-sidebar">
      <div class="map-sidebar-header">
        <h1 class="map-sidebar-title">Villes</h1>
        <p class="map-sidebar-sub">Cliquez sur une ville pour voir ses diffusions</p>
      </div>

      <div class="map-sidebar-content">
        <div class="map-city-list" id="map-city-list" aria-label="Liste des villes">
          <!-- Injected by JS from data -->
        </div>
      </div>

      <!-- Panel films d'une ville -->
      <div class="map-films-panel" id="map-films-panel" style="display:none">
        <div class="map-films-panel-header">
          <div class="map-films-panel-city" id="map-panel-city"></div>
        </div>
        <div class="map-films-list" id="map-films-list" aria-label="Films dans la ville sélectionnée">
          <!-- Injected by JS -->
        </div>
      </div>
    </aside>

    <!-- Carte -->
    <div id="map" aria-label="Carte interactive des villes du festival"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/data.js"></script>
  <script src="js/admin-sync.js"></script>
  <script src="js/dom-helpers.js"></script>
  <script src="js/main.js"></script>
  <script src="js/carte.js"></script>
</body>
</html>
